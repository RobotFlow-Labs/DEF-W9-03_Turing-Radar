[data]
data_root = "data"
subset = "test"
window_length = 50000
min_emitters = 2
max_emitters = 110
file_pattern = "*.h5"

[preprocess]
sort_by_toa = true
delta_toa = true
standardize = true
clip_std = 8.0

[clustering]
algorithm = "hdbscan"
default_label = -1
min_cluster_size = 20
min_samples = 5
eps = 0.0
kmeans_k = 8

[service]
host = "0.0.0.0"
port = 8080
