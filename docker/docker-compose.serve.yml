services:
  turing-radar-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.serve
    ports:
      - "${ANIMA_SERVE_PORT:-8080}:8080"
    env_file: ../.env.serve
    environment:
      - PYTHONUNBUFFERED=1
    profiles:
      - serve
      - api

  turing-radar-cuda:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cuda
    ports:
      - "${ANIMA_SERVE_PORT:-8080}:8080"
    env_file: ../.env.serve
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - weights:/data/weights
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    network_mode: host
    profiles:
      - serve
      - cuda

  turing-radar-ros2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cuda
    command: ["python", "-m", "anima_turing_radar.ros2_node"]
    env_file: ../.env.serve
    environment:
      - PYTHONUNBUFFERED=1
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - weights:/data/weights
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    network_mode: host
    profiles:
      - ros2

  turing-radar-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile.serve
    command: ["python", "-m", "pytest", "tests/", "-v"]
    working_dir: /app
    profiles:
      - test

volumes:
  weights:
